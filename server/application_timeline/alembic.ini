[alembic]
script_location = server/application_timeline/migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///data/crossbridge_application_timeline.db

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s %(name)s %(message)s
